version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm ci --cache .npm --prefer-offline
    build:
      commands:
        # grep exits 1 when a var is unset; || true keeps the build from failing
        - env | grep -e NEXT_PUBLIC_GA_MEASUREMENT_ID >> .env.production || true
        - env | grep -e RESEND_API_KEY >> .env.production || true
        - env | grep -e CONTACT_FORM_TO_EMAIL >> .env.production || true
        - env | grep -e CONTACT_FORM_FROM_EMAIL >> .env.production || true
        - npm run build
  artifacts:
    baseDirectory: .next
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
      - .npm/**/*
      - .next/cache/**/*
  customHeaders:
    - pattern: '**'
      headers:
        - key: 'Strict-Transport-Security'
          value: 'max-age=31536000; includeSubDomains'
        - key: 'X-Frame-Options'
          value: 'DENY'
        - key: 'X-Content-Type-Options'
          value: 'nosniff'
  redirects:
    - source: 'https://scottypeterson.net'
      target: 'https://www.scottypeterson.net'
      status: '301'
    - source: 'https://scottypeterson.net/<*>'
      target: 'https://www.scottypeterson.net/<*>'
      status: '301' 